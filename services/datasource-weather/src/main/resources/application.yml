spring:
  application:
    name: datasource-weather

aetherstream:
  write-side:
    base-url: ${AETHER_WRITE_SIDE_URL:http://localhost:8080}
  weather:
    polling:
      enabled: true
    poll-interval-ms: 60000
    api-url: https://api.open-meteo.com/v1/forecast

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
