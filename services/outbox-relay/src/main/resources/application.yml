spring:
  application:
    name: outbox-relay
  datasource:
    url: ${AETHER_DB_URL:jdbc:postgresql://localhost:5432/aetherstream}
    username: ${AETHER_DB_USER:aether}
    password: ${AETHER_DB_PASSWORD:aether}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${AETHER_KAFKA_BOOTSTRAP:localhost:9094}
    producer:
      acks: all

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# Relay tuning (consumed in the relay phase)
aetherstream:
  outbox:
    poll-interval-ms: 1000
    batch-size: 100
    max-retries: 5
