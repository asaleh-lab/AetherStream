spring:
  application:
    name: datasource-grid

aetherstream:
  write-side:
    base-url: ${AETHER_WRITE_SIDE_URL:http://localhost:8080}
  simulation:
    enabled: true
    interval-ms: 5000

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
