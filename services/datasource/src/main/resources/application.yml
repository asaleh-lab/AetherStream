spring:
  application:
    name: datasource

aetherstream:
  write-side:
    base-url: ${AETHER_WRITE_SIDE_URL:http://localhost:8080}
  turbine:
    simulation:
      enabled: true
    interval-ms: 5000
  grid:
    simulation:
      enabled: true
    interval-ms: 15000

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
