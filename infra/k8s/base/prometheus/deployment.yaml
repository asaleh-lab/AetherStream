apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: aether
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: write-side
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['write-side:8080']
      - job_name: datasource
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['datasource:8081']
      - job_name: outbox-relay
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['outbox-relay:8084']
      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['api-gateway:8085']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: aether
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: aether
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  loadBalancerIP: 10.1.0.11
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
