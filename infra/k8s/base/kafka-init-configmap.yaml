apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-init-scripts
  namespace: aether
data:
  create-topics.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    BOOTSTRAP="${BOOTSTRAP:-kafka:9092}"
    PARTITIONS="${PARTITIONS:-1}"
    REPLICAS="${REPLICAS:-1}"
    WAIT_SECONDS="${WAIT_SECONDS:-120}"

    echo "Waiting up to ${WAIT_SECONDS}s for Kafka broker at ${BOOTSTRAP}..."
    deadline=$((SECONDS + WAIT_SECONDS))
    until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server "${BOOTSTRAP}" >/dev/null 2>&1; do
      if (( SECONDS >= deadline )); then
        echo "Timed out waiting for Kafka broker at ${BOOTSTRAP}" >&2
        exit 1
      fi
      sleep 2
    done

    TOPICS=(
      turbine-events
      grid-events
      energy-state-events
      alerts
      recommendations
      dead-letter-events
      outbox-events
    )
    echo "Creating topics on ${BOOTSTRAP}"
    for topic in "${TOPICS[@]}"; do
      /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server "${BOOTSTRAP}" \
        --create --if-not-exists \
        --topic "${topic}" \
        --partitions "${PARTITIONS}" \
        --replication-factor "${REPLICAS}"
      echo "  ok: ${topic}"
    done
