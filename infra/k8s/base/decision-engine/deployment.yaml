apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
  namespace: aether
  labels:
    app: decision-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: decision-engine
  template:
    metadata:
      labels:
        app: decision-engine
    spec:
      serviceAccountName: aether-workload
      containers:
        - name: decision-engine
          image: aetherstream/decision-engine:latest
          envFrom:
            - configMapRef:
                name: aether-env
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
