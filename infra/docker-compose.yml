# Local stack for AetherStream.
# Usage: docker compose -f infra/docker-compose.yml up -d --build
#
# Profiles:
#   full           — Blazor dashboard (port 8086)
#   observability  — Grafana + Loki + Prometheus + Promtail (ports 3000, 3100, 9090)
#
# Examples:
#   docker compose -f infra/docker-compose.yml up -d --build
#   docker compose -f infra/docker-compose.yml --profile full --profile observability up -d --build
#
# Two-part layout:
#   - write-side: CQRS ingest APIs, PostgreSQL, outbox (the main backbone demo)
#   - datasource: single thin producer (turbine + grid simulators)

x-write-side-env: &write-side-env
  AETHER_DB_URL: jdbc:postgresql://postgres:5432/aetherstream
  AETHER_DB_USER: aether
  AETHER_DB_PASSWORD: aether
  AETHER_KAFKA_BOOTSTRAP: kafka:9092

x-write-side-depends: &write-side-depends
  postgres:
    condition: service_healthy
  kafka:
    condition: service_healthy

x-datasource-env: &datasource-env
  AETHER_WRITE_SIDE_URL: http://write-side:8080

services:
  postgres:
    image: postgres:16-alpine
    container_name: aether-postgres
    environment:
      POSTGRES_DB: aetherstream
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
    ports:
      - "5432:5432"
    volumes:
      - aether-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aetherstream"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: aether-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: aether-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/create-topics.sh:/scripts/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    environment:
      BOOTSTRAP: kafka:9092
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aether-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aether-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # --- Write side (CQRS, domain, outbox, PostgreSQL) ---

  write-side:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.write-side
    image: aetherstream/write-side:local
    container_name: aether-write-side
    depends_on: *write-side-depends
    ports:
      - "8080:8080"
    environment:
      <<: *write-side-env
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    labels:
      aetherstream.role: write-side

  # --- Data source (thin producer: turbine + grid simulators) ---

  datasource:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.datasource
    image: aetherstream/datasource:local
    container_name: aether-datasource
    depends_on:
      write-side:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      <<: *datasource-env
      SERVER_PORT: 8081
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    labels:
      aetherstream.role: datasource

  # --- Outbox relay (outbox_events -> Kafka) ---

  outbox-relay:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.outbox-relay
    image: aetherstream/outbox-relay:local
    container_name: aether-outbox-relay
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      write-side:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      <<: *write-side-env
      SERVER_PORT: 8084
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    labels:
      aetherstream.role: outbox-relay

  # --- Stream processor (Flink: aggregation join + anomaly detection) ---

  stream-processor:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.stream-processor
    image: aetherstream/stream-processor:local
    container_name: aether-stream-processor
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      outbox-relay:
        condition: service_healthy
    environment:
      AETHER_KAFKA_BOOTSTRAP: kafka:9092
      AETHER_KAFKA_OFFSET_RESET: latest
      AETHER_VIBRATION_THRESHOLD: "1.0"
    labels:
      aetherstream.role: stream-processor
    restart: unless-stopped

  decision-engine:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.decision-engine
    image: aetherstream/decision-engine:local
    container_name: aether-decision-engine
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      stream-processor:
        condition: service_started
    environment:
      AETHER_KAFKA_BOOTSTRAP: kafka:9092
      AETHER_KAFKA_OFFSET_RESET: latest
      AETHER_EFFICIENCY_TARGET: "0.85"
    labels:
      aetherstream.role: decision-engine
    restart: unless-stopped

  # --- API gateway (read-model projections, query APIs, WebSocket) ---

  api-gateway:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api-gateway
    image: aetherstream/api-gateway:local
    container_name: aether-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      stream-processor:
        condition: service_started
      decision-engine:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      <<: *write-side-env
      SERVER_PORT: 8085
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: latest
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8085/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    labels:
      aetherstream.role: api-gateway

  # --- Blazor dashboard (optional full stack profile) ---

  blazor-dashboard:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.blazor-dashboard
    image: aetherstream/blazor-dashboard:local
    container_name: aether-blazor-dashboard
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "8086:8080"
    environment:
      Gateway__BaseUrl: http://api-gateway:8085
      Gateway__WebSocketUrl: ws://api-gateway:8085/ws/realtime
      Dashboard__DisplayTimeZoneId: Europe/Berlin
      ASPNETCORE_URLS: http://+:8080
    volumes:
      - blazor-dataprotection:/app/dataprotection-keys
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    labels:
      aetherstream.role: blazor-dashboard

  # --- Observability (optional profile: logs + metrics in Grafana) ---

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.0.0
    container_name: aether-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    labels:
      aetherstream.role: loki

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:3.0.0
    container_name: aether-promtail
    depends_on:
      - loki
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    labels:
      aetherstream.role: promtail

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.53.0
    container_name: aether-prometheus
    depends_on:
      write-side:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    labels:
      aetherstream.role: prometheus

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.0.0
    container_name: aether-grafana
    depends_on:
      - loki
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    labels:
      aetherstream.role: grafana

volumes:
  aether-pgdata:
  blazor-dataprotection:
  loki-data:
  prometheus-data:
  grafana-data:
