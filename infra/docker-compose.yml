# Local stack for AetherStream.
# Usage: docker compose -f infra/docker-compose.yml up -d --build
#
# Data sources (write-side producers): weather, turbine telemetry, grid load.
# Each accepts POST /api/ingest/{weather|turbine|grid} and writes domain state + outbox rows.

x-datasource-env: &datasource-env
  AETHER_DB_URL: jdbc:postgresql://postgres:5432/aetherstream
  AETHER_DB_USER: aether
  AETHER_DB_PASSWORD: aether
  AETHER_KAFKA_BOOTSTRAP: kafka:9092

x-datasource-depends: &datasource-depends
  postgres:
    condition: service_healthy
  kafka:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: aether-postgres
    environment:
      POSTGRES_DB: aetherstream
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
    ports:
      - "5432:5432"
    volumes:
      - aether-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aetherstream"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: aether-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: aether-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/create-topics.sh:/scripts/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    environment:
      BOOTSTRAP: kafka:9092
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aether-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aether-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # --- Data sources (event producers into the write model) ---

  datasource-weather:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.datasource
      args:
        SERVICE_MODULE: services/ingestion-weather
        SERVICE_ARTIFACT: ingestion-weather
    image: aetherstream/datasource-weather:local
    container_name: aether-datasource-weather
    depends_on: *datasource-depends
    ports:
      - "8081:8081"
    environment:
      <<: *datasource-env
      SERVER_PORT: 8081
      AETHERSTREAM_WEATHER_POLLING_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    labels:
      aetherstream.role: datasource
      aetherstream.stream: weather

  datasource-turbine:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.datasource
      args:
        SERVICE_MODULE: services/ingestion-turbine
        SERVICE_ARTIFACT: ingestion-turbine
    image: aetherstream/datasource-turbine:local
    container_name: aether-datasource-turbine
    depends_on: *datasource-depends
    ports:
      - "8082:8082"
    environment:
      <<: *datasource-env
      SERVER_PORT: 8082
      AETHERSTREAM_SIMULATION_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    labels:
      aetherstream.role: datasource
      aetherstream.stream: turbine

  datasource-grid:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.datasource
      args:
        SERVICE_MODULE: services/ingestion-grid
        SERVICE_ARTIFACT: ingestion-grid
    image: aetherstream/datasource-grid:local
    container_name: aether-datasource-grid
    depends_on: *datasource-depends
    ports:
      - "8083:8083"
    environment:
      <<: *datasource-env
      SERVER_PORT: 8083
      AETHERSTREAM_SIMULATION_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    labels:
      aetherstream.role: datasource
      aetherstream.stream: grid

volumes:
  aether-pgdata:
